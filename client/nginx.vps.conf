server {
    listen 80;
    server_name jvteststock.com www.jvteststock.com; # Domain configuration

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name jvteststock.com www.jvteststock.com; # Domain configuration

    ssl_certificate /etc/nginx/certs/fullchain.pem; # Path to your SSL certificate
    ssl_certificate_key /etc/nginx/certs/privkey.pem; # Path to your SSL private key

    # SSL configuration (adjust as needed for security)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 25M;

    location / {
        proxy_pass http://api:3080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
